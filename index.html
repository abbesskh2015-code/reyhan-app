<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ریحان کوچولو</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #ffe6f2, #e6f7ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .app {
      width: 95%;
      max-width: 430px;
      min-height: 90vh;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 2px dashed #ffd1e6;
    }

    .avatar {
      width: 115px;
      height: 115px;
      margin: 5px auto 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffb6d9, #b6e5ff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 54px;
      animation: floatAvatar 2.5s ease-in-out infinite;
      box-shadow: 0 8px 18px rgba(255, 120, 180, 0.3);
    }

    @keyframes floatAvatar {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
      100% {
        transform: translateY(0);
      }
    }

    h1 {
      margin: 5px 0;
      color: #ff5ca8;
      font-size: 28px;
    }

    .subtitle {
      margin: 0;
      color: #666;
      font-size: 15px;
    }

    .chat-box {
      flex: 1;
      margin-top: 18px;
      padding: 12px;
      background: #fff9fc;
      border-radius: 20px;
      overflow-y: auto;
      border: 1px solid #ffe1ef;
    }

    .message {
      max-width: 85%;
      padding: 12px 14px;
      margin: 10px 0;
      border-radius: 18px;
      line-height: 1.7;
      font-size: 15px;
      animation: fadeIn 0.35s ease;
    }

    .bot {
      background: #e6f7ff;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .user {
      background: #ffe6f2;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 13px 8px;
      font-size: 15px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff8fc7, #7ed6ff);
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:active {
      transform: scale(0.96);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
    }

    .wide {
      grid-column: span 2;
      background: linear-gradient(135deg, #9bdeac, #7ed6ff);
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="avatar">🌸</div>
      <h1>ریحان کوچولو</h1>
      <p class="subtitle">دوست کوچولوی مهربون برای بازی و شادی</p>
    </div>

    <div id="chatBox" class="chat-box">
      <div class="message bot">
        سلام ریحان جان! من اینجام تا با هم بازی کنیم. یکی از گزینه‌ها رو انتخاب کن.
      </div>
    </div>

    <div class="buttons">
      <button onclick="chooseGame('نقاشی')">🎨 نقاشی</button>
      <button onclick="chooseGame('قصه')">📖 قصه</button>
      <button onclick="chooseGame('آهنگ')">🎵 آهنگ</button>
      <button onclick="chooseGame('بازی شادی')">🎈 بازی شادی</button>
      <button class="wide" onclick="sayWelcome()">🌷 سلام دوباره</button>
    </div>

    <div class="footer">
      ساخته شده برای ریحان کوچولو 💖
    </div>
  </div>

  <audio id="welcomeAudio" src="welcome.mp3"></audio>
  <audio id="choiceAudio" src="good-choice.mp3"></audio>

  <script>
    const chatBox = document.getElementById("chatBox");
    const welcomeAudio = document.getElementById("welcomeAudio");
    const choiceAudio = document.getElementById("choiceAudio");

    function addMessage(text, type) {
      const msg = document.createElement("div");
      msg.className = "message " + type;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function playAudio(audioElement) {
      audioElement.currentTime = 0;
      audioElement.play().catch(function(error) {
        console.log("پخش صدا انجام نشد:", error);
      });
    }

    function sayWelcome() {
      addMessage("سلام ریحان کوچولو 🌸", "user");
      setTimeout(function() {
        addMessage("سلام عزیزم! خوش اومدی. بیا با هم بازی کنیم 💕", "bot");
        playAudio(welcomeAudio);
      }, 500);
    }

    function chooseGame(gameName) {
      addMessage(gameName, "user");

      setTimeout(function() {
        addMessage("چه انتخاب خوبی! بریم سراغ " + gameName + " 😍", "bot");
        playAudio(choiceAudio);
      }, 500);
    }

    window.addEventListener("load", function() {
      setTimeout(function() {
        playAudio(welcomeAudio);
      }, 800);
    });
  </script>
</body>
</html>
