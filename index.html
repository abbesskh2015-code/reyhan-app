  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f2, #e6f7ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .app {
      width: 95%;
      max-width: 430px;
      min-height: 92vh;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 28px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
      padding: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 2px dashed #ffd1e6;
    }

    .avatar {
      width: 125px;
      height: 125px;
      margin: 5px auto 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd1e6, #b6e5ff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 72px;
      animation: floatAvatar 2.5s ease-in-out infinite;
      box-shadow: 0 8px 18px rgba(255, 120, 180, 0.35);
      border: 5px solid #fff;
    }

    @keyframes floatAvatar {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }

      100% {
        transform: translateY(0);
      }
    }

    h1 {
      margin: 5px 0;
      color: #ff5ca8;
      font-size: 28px;
    }

    .subtitle {
      margin: 0;
      color: #666;
      font-size: 14px;
      line-height: 1.8;
    }

    .chat-box {
      flex: 1;
      margin-top: 15px;
      padding: 12px;
      background: #fff9fc;
      border-radius: 20px;
      overflow-y: auto;
      border: 1px solid #ffe1ef;
      min-height: 380px;
      max-height: 500px;
    }

    .message {
      max-width: 90%;
      padding: 11px 13px;
      margin: 9px 0;
      border-radius: 18px;
      line-height: 1.8;
      font-size: 14px;
      animation: fadeIn 0.35s ease;
      white-space: pre-line;
    }

    .bot {
      background: #e6f7ff;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .user {
      background: #ffe6f2;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 13px 8px;
      font-size: 13.5px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff8fc7, #7ed6ff);
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-family: Tahoma, Arial, sans-serif;
      line-height: 1.5;
    }

    button:active {
      transform: scale(0.96);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
    }

    .green {
      background: linear-gradient(135deg, #8ee6a8, #63d8ff);
    }

    .purple {
      background: linear-gradient(135deg, #c79bff, #ff8fc7);
    }

    .orange {
      background: linear-gradient(135deg, #ffb36b, #ff8fc7);
    }

    .blue {
      background: linear-gradient(135deg, #6bc7ff, #9bdeac);
    }

    .wide {
      grid-column: span 2;
      background: linear-gradient(135deg, #9bdeac, #7ed6ff);
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 9px;
    }

    function addMessage(text, type) {
      const msg = document.createElement("div");
      msg.className = "message " + type;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function playAudio(audioElement) {
      audioElement.currentTime = 0;
      audioElement.play().catch(function(error) {
        console.log("پخش صدا انجام نشد:", error);
      });
    }

    function randomItem(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function formatGame(game) {
      return "چه انتخاب خوبی! 🌟\n\n" +
        "🎯 پیشنهاد من:\n" + game.title + "\n\n" +
        "👥 تعداد بازیکن: " + game.players + "\n" +
        "⭐ نوع بازی: " + game.type;
    }

    function suggestFromList(userText, list) {
      addMessage(userText, "user");

      const game = randomItem(list);

      setTimeout(function() {
        addMessage(formatGame(game), "bot");
        playAudio(choiceAudio);
      }, 500);
    }
